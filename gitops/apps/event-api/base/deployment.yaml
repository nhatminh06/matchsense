apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-api
  namespace: matchsense
  labels:
    app: event-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-api
  template:
    metadata:
      labels:
        app: event-api
    spec:
      enableServiceLinks: false
      containers:
        - name: event-api
          image: ghcr.io/nhatminh06/event-api@sha256:dee0e41f951b42b08e971d82f4c3c928ac506c4c57c50e065eb44cdd03be3d85
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: KAFKA_BROKER
              value: "kafka:29092"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "jaeger:4318"
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5