apiVersion: apps/v1
kind: Deployment
metadata:
  name: match-simulator
  namespace: matchsense
  labels:
    app: match-simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: match-simulator
  template:
    metadata:
      labels:
        app: match-simulator
    spec:
      enableServiceLinks: false
      containers:
        - name: match-simulator
          image: ghcr.io/nhatminh06/match-simulator@sha256:11cf3df5ca52a53d3485ad028ad0cf914693d0bedca853f79fd023ede75466de
          env:
            - name: EVENT_API_URL
              value: "http://event-api:8080"
            - name: MATCH_ID
              value: "ars-mci-2026"
            - name: HOME_TEAM
              value: "Arsenal"
            - name: AWAY_TEAM
              value: "Manchester City"
            - name: SPEED
              value: "2"
          resources:
            requests:
              memory: "16Mi"
              cpu: "25m"
            limits:
              memory: "32Mi"
              cpu: "50m"