apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: matchsense-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/nhatminh06/matchsense.git
    targetRevision: HEAD
    path: gitops/argocd-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true