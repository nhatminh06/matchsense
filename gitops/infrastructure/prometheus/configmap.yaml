apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: matchsense
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "event-api"
        static_configs:
          - targets: ["event-api:8080"]

      - job_name: "query-api"
        static_configs:
          - targets: ["query-api:8083"]

      - job_name: "ml-predictor"
        static_configs:
          - targets: ["ml-predictor:8084"]